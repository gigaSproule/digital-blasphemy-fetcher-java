name: "Run main workflow"

on:
  pull_request:
  push:
    branches:
      - "main"
    tags:
      - "*"

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  verify:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Run check
        run: ./mvnw -B clean verify

  release-dry-run:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    needs:
      - verify
    if: ${{ github.ref_type != 'tag' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Package executable jar
        run: ./mvnw -B package -DskipTests
      - name: Package custom JRE
        run: ./mvnw -B jlink:jlink

  package-linux:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    needs:
      - verify
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Set version for release
        run: |
          ./mvnw versions:set -DnewVersion="${{ github.ref_name }}"
      - name: Package executable jar
        run: ./mvnw -B package -DskipTests
      - name: Package custom JRE
        run: ./mvnw -B jlink:jlink
      - name: Rename custom JRE
        run: mv target/digital-blasphemy-fetcher-${{ github.ref_name }}.zip target/digital-blasphemy-fetcher-linux-${{ github.ref_name }}.zip
      - name: Temporarily save linux custom JRE
        uses: actions/upload-artifact@v7
        with:
          name: digital-blasphemy-fetcher-linux
          path: |
            target/digital-blasphemy-fetcher-${{ github.ref_name }}-bin.jar
            target/digital-blasphemy-fetcher-linux-${{ github.ref_name }}.zip

  package-windows:
    runs-on: "windows-latest"
    timeout-minutes: 30
    needs:
      - verify
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Set autocrlf to false
        run: git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Set version for release
        run: |
          ./mvnw versions:set -DnewVersion="${{ github.ref_name }}"
      - name: Package executable jar
        run: ./mvnw -B package -DskipTests
      - name: Package custom JRE
        run: ./mvnw -B jlink:jlink
      - name: Rename custom JRE
        run: mv target/digital-blasphemy-fetcher-${{ github.ref_name }}.zip target/digital-blasphemy-fetcher-windows-${{ github.ref_name }}.zip
      - name: Temporarily save windows custom JRE
        uses: actions/upload-artifact@v7
        with:
          name: digital-blasphemy-fetcher-windows
          path: target/digital-blasphemy-fetcher-windows-${{ github.ref_name }}.zip

  package-macos:
    runs-on: "macos-latest"
    timeout-minutes: 30
    needs:
      - verify
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Set version for release
        run: |
          ./mvnw versions:set -DnewVersion="${{ github.ref_name }}"
      - name: Package executable jar
        run: ./mvnw -B package -DskipTests
      - name: Package custom JRE
        run: ./mvnw -B jlink:jlink
      - name: Rename custom JRE
        run: mv target/digital-blasphemy-fetcher-${{ github.ref_name }}.zip target/digital-blasphemy-fetcher-macos-${{ github.ref_name }}.zip
      - name: Temporarily save macos custom JRE
        uses: actions/upload-artifact@v7
        with:
          name: digital-blasphemy-fetcher-macos
          path: target/digital-blasphemy-fetcher-macos-${{ github.ref_name }}.zip

  release:
    runs-on: "ubuntu-latest"
    timeout-minutes: 30
    needs:
      - package-linux
      - package-windows
      - package-macos
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
      - run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          gh auth setup-git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - name: Set version for release
        run: |
          ./mvnw versions:set -DnewVersion="${{ github.ref_name }}"
      - name: Commit release version
        run: |
          git add pom.xml
          git commit -m "chore: set version to ${{ github.ref_name }}"
      - name: Set version for next release
        id: next-release-version
        run: |
          NEXT_VERSION=$(echo ${{ github.ref_name }} | awk -F. -v OFS=. '{$NF += 1 ; print}')-SNAPSHOT
          ./mvnw versions:set -DnewVersion="${NEXT_VERSION}"
          echo "next-version=${NEXT_VERSION}" >> $GITHUB_OUTPUT
      - name: Commit next release version
        run: |
          git add pom.xml
          git commit -m "chore: set version to ${{ steps.next-release-version.outputs.next-version }}"
          git push origin HEAD:main
      - name: Retrieve saved linux custom JRE
        uses: actions/download-artifact@v8
        with:
          name: digital-blasphemy-fetcher-linux
      - name: Retrieve saved windows custom JRE
        uses: actions/download-artifact@v8
        with:
          name: digital-blasphemy-fetcher-windows
      - name: Retrieve saved mac os custom JRE
        uses: actions/download-artifact@v8
        with:
          name: digital-blasphemy-fetcher-macos
      - name: Create Release
        uses: ncipollo/release-action@v1.21.0
        with:
          artifacts: "digital-blasphemy-fetcher*.zip,digital-blasphemy-fetcher*-bin.jar"
          generateReleaseNotes: true
          makeLatest: true
